<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>染井吉野・成员权威核验</title>
  <desc>具有宽圆花瓣、瓣端缺刻、花脉和花蕊细节的染井吉野，叠加绿色认证章。</desc>
  <defs>
    <linearGradient id="petal-a" x1="25" y1="3" x2="25" y2="29" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7FB"/>
      <stop offset=".42" stop-color="#F9C6D8"/>
      <stop offset="1" stop-color="#E97EA7"/>
    </linearGradient>
    <linearGradient id="petal-b" x1="17" y1="5" x2="29" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9FC"/>
      <stop offset=".48" stop-color="#F7BBD1"/>
      <stop offset="1" stop-color="#E675A0"/>
    </linearGradient>
    <radialGradient id="flower-heart" cx="0" cy="0" r="1" gradientTransform="translate(25 29) rotate(90) scale(7.5)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF5C8"/>
      <stop offset=".45" stop-color="#F3B54C"/>
      <stop offset="1" stop-color="#D95788"/>
    </radialGradient>
    <linearGradient id="seal-fill" x1="42" y1="39" x2="57" y2="59" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF8EF"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.15" flood-color="#9E3F69" flood-opacity=".18"/>
    </filter>
    <filter id="seal-shadow" x="-30%" y="-30%" width="170%" height="170%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#236842" flood-opacity=".2"/>
    </filter>
    <path id="somei-petal" d="M25 29C20.4 25.5 16.35 20.35 15.7 15.15C15.05 10.15 18.05 5.65 22.7 3.05C23.8 5.55 24.65 7.55 25.3 9.95C26.6 7.65 28.35 5.65 30.8 4.15C33.65 8.35 34.2 13.2 32.2 17.85C30.35 22.3 27.85 26.1 25 29Z"/>
    <path id="petal-vein" d="M25 28.2C24.6 23.2 24.75 17.1 25.3 10.7"/>
    <g id="stamen">
      <path d="M25 28.8C24.6 25.2 23.95 22.7 22.55 20.3"/>
      <circle cx="22.25" cy="19.65" r="1.05"/>
    </g>
  </defs>

  <g filter="url(#soft-shadow)">
    <g stroke="#D95F8D" stroke-width="1.35" stroke-linejoin="round">
      <use href="#somei-petal" fill="url(#petal-a)"/>
      <use href="#somei-petal" fill="url(#petal-b)" transform="rotate(72 25 29)"/>
      <use href="#somei-petal" fill="url(#petal-a)" transform="rotate(144 25 29)"/>
      <use href="#somei-petal" fill="url(#petal-b)" transform="rotate(216 25 29)"/>
      <use href="#somei-petal" fill="url(#petal-a)" transform="rotate(288 25 29)"/>
    </g>

    <g stroke="#D96B94" stroke-width="1.75" stroke-linecap="round" opacity=".66">
      <use href="#petal-vein"/>
      <use href="#petal-vein" transform="rotate(72 25 29)"/>
      <use href="#petal-vein" transform="rotate(144 25 29)"/>
      <use href="#petal-vein" transform="rotate(216 25 29)"/>
      <use href="#petal-vein" transform="rotate(288 25 29)"/>
    </g>

    <circle cx="25" cy="29" r="5.2" fill="url(#flower-heart)" stroke="#D95F86" stroke-width="1.1"/>

    <g fill="#F8CB55" stroke="#B95675" stroke-width="1.15" stroke-linecap="round">
      <use href="#stamen"/>
      <use href="#stamen" transform="rotate(36 25 29)"/>
      <use href="#stamen" transform="rotate(72 25 29)"/>
      <use href="#stamen" transform="rotate(108 25 29)"/>
      <use href="#stamen" transform="rotate(144 25 29)"/>
      <use href="#stamen" transform="rotate(180 25 29)"/>
      <use href="#stamen" transform="rotate(216 25 29)"/>
      <use href="#stamen" transform="rotate(252 25 29)"/>
      <use href="#stamen" transform="rotate(288 25 29)"/>
      <use href="#stamen" transform="rotate(324 25 29)"/>
    </g>

    <circle cx="25" cy="29" r="2.15" fill="#FFF0A4" stroke="#CC6A78" stroke-width="1"/>
    <circle cx="24.3" cy="28.3" r=".72" fill="#FFFFFF" opacity=".78"/>
  </g>

  <g filter="url(#seal-shadow)">
    <circle cx="49.3" cy="48.6" r="12.25" fill="url(#seal-fill)" stroke="#32945A" stroke-width="3"/>
    <circle cx="49.3" cy="48.6" r="8.9" stroke="#A8DDBA" stroke-width="1.35"/>
    <path d="M42.9 48.3L47.1 52.5L55.9 43.3" stroke="#27834E" stroke-width="4.15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M43.8 47.6L47.1 50.9" stroke="#65B580" stroke-width="1.1" stroke-linecap="round" opacity=".65"/>
  </g>
</svg>
